<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EL ROI ‚Äî 4-in-1</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');
:root{
  --bg:#03060f;--panel:#070c18;--border:#0d1830;--border2:#152840;
  --accent:#00d4ff;--green:#00ff9d;--red:#ff2d55;--yellow:#ffd60a;
  --orange:#ff6b2b;--purple:#bf5af2;--gold:#ffd700;--text:#8ab0c8;--dim:#1e3a55;--white:#deeeff;
  --brand:#ff2d55;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;}

/* PASSWORD */
.pwd-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;}
.pwd-screen.hidden{display:none;}
.pwd-box{background:var(--panel);border:2px solid var(--brand);border-radius:16px;padding:40px 28px;text-align:center;width:90%;max-width:340px;box-shadow:0 0 40px rgba(255,45,85,0.15);}
.pwd-logo{font-size:52px;margin-bottom:8px;}
.pwd-title{font-family:'Black Ops One',cursive;font-size:28px;color:var(--brand);letter-spacing:5px;margin-bottom:4px;}
.pwd-sub{font-size:10px;color:var(--dim);letter-spacing:3px;margin-bottom:22px;font-family:'Share Tech Mono',monospace;}
.pwd-input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:13px;color:var(--white);font-family:'Share Tech Mono',monospace;font-size:17px;outline:none;text-align:center;letter-spacing:5px;margin-bottom:13px;}
.pwd-input:focus{border-color:var(--brand);}
.pwd-btn{width:100%;padding:13px;border:none;border-radius:10px;background:linear-gradient(135deg,#ff2d55,#ff6b2b);color:#fff;font-family:'Black Ops One',cursive;font-size:14px;letter-spacing:3px;cursor:pointer;}
.pwd-error{color:var(--red);font-family:'Share Tech Mono',monospace;font-size:11px;margin-top:8px;min-height:15px;}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:2px solid rgba(255,45,85,0.4);background:rgba(7,12,24,0.98);position:sticky;top:0;z-index:100;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-icon{font-size:26px;}
.brand h1{font-family:'Black Ops One',cursive;font-size:18px;letter-spacing:4px;color:var(--brand);}
.brand small{font-size:8px;color:var(--dim);letter-spacing:3px;display:block;font-family:'Share Tech Mono',monospace;}
.conn-pill{display:flex;align-items:center;gap:6px;font-family:'Share Tech Mono',monospace;font-size:9px;background:var(--panel);border:1px solid var(--border2);padding:5px 10px;border-radius:12px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--dim);}
.dot.running{background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 1s infinite;}
.dot.stopped{background:var(--red);}
.dot.connecting{background:var(--orange);animation:blink 0.4s infinite;}
.dot.scanning{background:var(--yellow);animation:blink 0.6s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

/* BOT TABS */
.bot-tabs{display:flex;background:var(--panel);border-bottom:1px solid var(--border2);}
.bot-tab{flex:1;padding:9px 4px;text-align:center;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;color:var(--dim);border-bottom:3px solid transparent;transition:all 0.2s;}
.bot-tab.active{color:var(--white);border-bottom-color:var(--brand);}
.bot-tab .bs{font-size:8px;display:block;margin-top:1px;}
.bot-tab.st-running{color:var(--green);}
.bot-tab.st-stopped{color:var(--dim);}
.bot-tab.st-connecting{color:var(--orange);}
.bot-tab.st-paused{color:var(--yellow);}

/* SUB TABS */
.sub-tabs{display:flex;gap:2px;padding:6px 12px 0;border-bottom:1px solid var(--border2);background:var(--panel);}
.sub-tab{padding:6px 12px;border-radius:6px 6px 0 0;font-size:10px;letter-spacing:1px;cursor:pointer;color:var(--dim);font-weight:700;border:1px solid transparent;border-bottom:none;background:transparent;font-family:'Rajdhani',sans-serif;}
.sub-tab.active{background:var(--bg);color:var(--brand);border-color:var(--border2);}

/* PAGES */
.bot-view{display:none;}
.bot-view.active{display:block;}
.sub-page{display:none;padding:12px 14px;}
.sub-page.active{display:block;}

/* PANELS */
.panel{background:var(--panel);border:1px solid var(--border2);border-radius:10px;padding:14px;margin-bottom:12px;}
.panel-title{font-size:9px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:12px;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px;}
.stat-box{background:var(--bg);border:1px solid var(--border2);border-radius:7px;padding:8px;text-align:center;}
.stat-val{font-family:'Share Tech Mono',monospace;font-size:20px;line-height:1;margin-bottom:2px;}
.stat-lbl{font-size:8px;letter-spacing:1px;color:var(--dim);}
.pnl-big{font-family:'Black Ops One',cursive;font-size:38px;text-align:center;margin:8px 0 2px;}
.pnl-lbl{font-size:9px;letter-spacing:3px;color:var(--dim);text-align:center;margin-bottom:12px;}
.ticker{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--accent);text-align:center;padding:8px;background:var(--bg);border-radius:7px;border:1px solid var(--border2);min-height:30px;display:flex;align-items:center;justify-content:center;}

/* TREND */
.tf-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px;}
.tf-box{background:var(--bg);border:1px solid var(--border2);border-radius:7px;padding:8px;text-align:center;}
.tf-box.dn{border-color:rgba(255,45,85,0.4);background:rgba(255,45,85,0.05);}
.tf-box.up{border-color:rgba(0,255,157,0.3);}
.tf-label{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim);margin-bottom:3px;}
.tf-signal{font-size:16px;margin-bottom:1px;}
.tf-status{font-size:8px;letter-spacing:1px;}

/* LEVELS */
.struct-block{margin-bottom:8px;border:1px solid var(--border2);border-radius:8px;overflow:hidden;}
.struct-hdr{padding:5px 10px;background:rgba(255,255,255,0.02);font-size:8px;letter-spacing:2px;color:var(--dim);display:flex;justify-content:space-between;}
.r-level{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg);border-top:1px solid var(--border);font-family:'Share Tech Mono',monospace;font-size:12px;}
.r-level.small-lv{border-left:2px solid var(--accent);}
.r-level.big-lv{border-left:2px solid var(--orange);}
.r-level.next-lv{border-left:2px solid var(--purple);background:rgba(191,90,242,0.03);}
.r-level.ignored-lv{opacity:0.35;}
.r-badge{font-size:8px;padding:1px 5px;border-radius:3px;}
.rb-s{background:rgba(0,212,255,0.08);color:var(--accent);border:1px solid rgba(0,212,255,0.2);}
.rb-b{background:rgba(255,107,43,0.08);color:var(--orange);border:1px solid rgba(255,107,43,0.2);}
.rb-p{background:rgba(191,90,242,0.08);color:var(--purple);border:1px solid rgba(191,90,242,0.2);}
.btn-ign{font-size:8px;padding:2px 7px;border-radius:3px;cursor:pointer;border:1px solid rgba(255,214,10,0.3);background:rgba(255,214,10,0.05);color:var(--yellow);font-family:'Rajdhani',sans-serif;font-weight:700;}
.btn-ign.active{border-color:rgba(0,255,157,0.4);background:rgba(0,255,157,0.05);color:var(--green);}

/* COUNTDOWNS */
.cd-box{display:none;border-radius:10px;padding:13px;margin-bottom:12px;text-align:center;}
.cd-box.show{display:block;}
.cd-loss{background:rgba(255,45,85,0.06);border:2px solid rgba(255,45,85,0.35);}
.cd-toff{background:rgba(255,214,10,0.05);border:2px solid rgba(255,214,10,0.3);}
.cd-htf{background:rgba(191,90,242,0.05);border:2px solid rgba(191,90,242,0.3);}
.cd-lbl{font-size:8px;letter-spacing:3px;color:var(--dim);margin-bottom:5px;font-family:'Share Tech Mono',monospace;}
.cd-val{font-family:'Black Ops One',cursive;font-size:42px;line-height:1;}
.cd-val.red{color:var(--red);}
.cd-val.yel{color:var(--yellow);}
.cd-val.pur{color:var(--purple);}
.cd-sub{font-size:9px;color:var(--dim);margin-top:5px;letter-spacing:1px;}
.cd-bar{height:3px;background:var(--border2);border-radius:2px;margin-top:8px;overflow:hidden;}
.cd-fill{height:100%;border-radius:2px;transition:width 1s linear;}
.btn-skip{width:100%;padding:8px;border:1px solid rgba(255,107,43,0.4);border-radius:7px;color:var(--orange);background:rgba(255,107,43,0.07);font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;cursor:pointer;margin-top:8px;}

/* TIME OFF BUTTONS */
.toff-btns{display:flex;gap:6px;}
.btn-toff{flex:1;padding:8px 6px;border-radius:7px;border:1px solid var(--border2);background:var(--bg);color:var(--dim);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer;text-align:center;}
.btn-toff:hover{border-color:var(--yellow);color:var(--yellow);}

/* ZONES */
.zone-item{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;border-radius:6px;margin-bottom:5px;font-family:'Share Tech Mono',monospace;font-size:11px;}
.zone-item.dnt{background:var(--bg);border:1px dashed rgba(255,45,85,0.35);color:var(--red);}
.zone-item.htf{background:var(--bg);border:1px dashed rgba(191,90,242,0.35);color:var(--purple);}
.zone-item.htf.cancelled{opacity:0.35;border-style:dotted;}
.zone-item.htf.auto-zone{border-color:rgba(191,90,242,0.5);}
.zone-item.htf.manual-zone{border-color:rgba(255,214,10,0.4);color:var(--yellow);}
.htf-badge{font-size:7px;padding:1px 4px;border-radius:3px;margin-left:4px;font-family:'Share Tech Mono',monospace;}
.htf-badge.auto{background:rgba(191,90,242,0.15);color:var(--purple);border:1px solid rgba(191,90,242,0.3);}
.htf-badge.manual{background:rgba(255,214,10,0.1);color:var(--yellow);border:1px solid rgba(255,214,10,0.3);}
.btn-restore{font-size:8px;padding:2px 7px;border-radius:3px;cursor:pointer;border:1px solid rgba(0,255,157,0.3);background:rgba(0,255,157,0.05);color:var(--green);font-family:'Rajdhani',sans-serif;font-weight:700;}
.btn-del{font-size:8px;padding:2px 7px;border-radius:3px;cursor:pointer;border:1px solid rgba(255,45,85,0.3);background:rgba(255,45,85,0.05);color:var(--red);font-family:'Rajdhani',sans-serif;font-weight:700;}
.btn-del.htf-del{border-color:rgba(191,90,242,0.3);background:rgba(191,90,242,0.05);color:var(--purple);}
.zone-add-row{display:grid;grid-template-columns:1fr 1fr auto;gap:7px;align-items:end;margin-top:8px;}

/* LOGIN WITH DERIV BUTTON */
.btn-deriv-login{width:100%;padding:13px;border:none;border-radius:10px;background:linear-gradient(135deg,#00c06e,#00d4ff);color:#000;font-family:'Black Ops One',cursive;font-size:13px;letter-spacing:2px;cursor:pointer;box-shadow:0 4px 16px rgba(0,212,255,0.2);margin-bottom:4px;}
.btn-deriv-login:disabled{opacity:0.4;cursor:not-allowed;}
.btn-deriv-login.logged-in{background:linear-gradient(135deg,#00ff9d,#00d4ff);}

/* ACCOUNT TYPE TOGGLE */
.acct-toggle{display:flex;gap:0;margin-bottom:12px;border-radius:8px;overflow:hidden;border:1px solid var(--border2);}
.acct-btn{flex:1;padding:10px 8px;text-align:center;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;color:var(--dim);background:var(--bg);border:none;transition:all 0.2s;}
.acct-btn.demo.sel{background:rgba(0,212,255,0.1);color:var(--accent);border-right:1px solid var(--border2);}
.acct-btn.live.sel{background:rgba(0,255,157,0.1);color:var(--green);}
.acct-btn.demo{border-right:1px solid var(--border2);}

/* FIELDS */
.field{margin-bottom:10px;}
.field label{display:block;font-size:9px;letter-spacing:2px;color:var(--dim);margin-bottom:4px;}
.field input,.field select{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:7px;padding:9px 12px;color:var(--white);font-family:'Share Tech Mono',monospace;font-size:12px;outline:none;-webkit-appearance:none;}
.field input:focus,.field select:focus{border-color:var(--brand);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.mkt-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;}
.mkt-btn{padding:8px 10px;border-radius:7px;border:1px solid var(--border2);background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;cursor:pointer;text-align:left;}
.mkt-btn.sel{background:rgba(255,45,85,0.07);border-color:var(--brand);color:var(--brand);}
.mkt-btn .mn{display:block;font-size:10px;}
.mkt-btn .mt{display:block;font-size:8px;color:var(--dim);margin-top:1px;}
.cmd-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;}
.cmd-btn{padding:10px 8px;border-radius:8px;border:1px solid var(--border2);background:var(--bg);cursor:pointer;text-align:center;font-family:'Rajdhani',sans-serif;}
.cmd-btn.sel{background:rgba(255,45,85,0.07);border-color:var(--brand);}
.cmd-btn .ci{font-size:18px;display:block;margin-bottom:3px;}
.cmd-btn .cn{font-size:11px;font-weight:700;color:var(--white);display:block;}
.sub-opts{display:none;background:rgba(255,45,85,0.02);border:1px solid rgba(255,45,85,0.15);border-radius:8px;padding:12px;margin-bottom:8px;}
.sub-opts.show{display:block;}
.sub-title{font-size:9px;color:var(--brand);letter-spacing:2px;margin-bottom:8px;}

/* BUTTONS */
.btn-start{width:100%;padding:14px;border:none;border-radius:10px;background:linear-gradient(135deg,#ff2d55,#ff6b2b);color:#fff;font-family:'Black Ops One',cursive;font-size:14px;letter-spacing:3px;cursor:pointer;box-shadow:0 4px 16px rgba(255,45,85,0.3);}
.btn-start:disabled{opacity:0.3;cursor:not-allowed;}
.btn-stop{width:100%;padding:10px;border:1px solid var(--red);border-radius:10px;background:rgba(255,45,85,0.06);color:var(--red);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;cursor:pointer;margin-top:8px;}
input[type="checkbox"]{accent-color:var(--brand);width:14px;height:14px;}
.tf-check-lbl{display:flex;align-items:center;gap:5px;font-size:11px;cursor:pointer;color:var(--text);padding:6px 8px;border:1px solid var(--border2);border-radius:6px;background:var(--bg);font-family:'Rajdhani',sans-serif;font-weight:600;}
.btn-test-trade{width:100%;padding:11px;border:2px solid var(--orange);border-radius:10px;background:rgba(255,107,43,0.08);color:var(--orange);font-family:'Black Ops One',cursive;font-size:13px;letter-spacing:2px;cursor:pointer;transition:all 0.15s;}
.btn-test-trade:hover{background:rgba(255,107,43,0.18);box-shadow:0 0 12px rgba(255,107,43,0.3);}
.btn-test-trade:disabled{opacity:0.3;cursor:not-allowed;}
.btn-stop:disabled{opacity:0.2;cursor:not-allowed;}
.save-btn{width:100%;padding:9px;background:rgba(255,45,85,0.07);border:1px solid rgba(255,45,85,0.25);border-radius:7px;color:var(--brand);font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;cursor:pointer;margin-top:4px;}
.add-btn{padding:8px 13px;border-radius:7px;border:1px solid rgba(0,212,255,0.3);background:rgba(0,212,255,0.05);color:var(--accent);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;cursor:pointer;}
.add-btn.htf{border-color:rgba(191,90,242,0.3);background:rgba(191,90,242,0.05);color:var(--purple);}

/* CHART */
.chart-wrap{background:var(--panel);border:1px solid var(--border2);border-radius:10px;margin-bottom:12px;overflow:hidden;}
.chart-hdr{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border);}
.chart-title-lbl{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--white);}
.tf-btns{display:flex;gap:3px;flex-wrap:wrap;}
.tf-btn{padding:3px 8px;border-radius:4px;font-size:9px;cursor:pointer;color:var(--dim);font-weight:700;border:1px solid var(--border2);background:transparent;font-family:'Rajdhani',sans-serif;}
.tf-btn.active{background:rgba(255,45,85,0.1);color:var(--brand);border-color:var(--brand);}
canvas{width:100%;height:240px;display:block;}

/* HISTORY */
.hist-filters{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;}
.hf-btn{padding:5px 9px;border-radius:5px;font-size:9px;font-weight:700;cursor:pointer;border:1px solid var(--border2);background:var(--bg);color:var(--dim);font-family:'Rajdhani',sans-serif;letter-spacing:1px;}
.hf-btn.active{border-color:var(--brand);color:var(--brand);background:rgba(255,45,85,0.05);}
.custom-dates{display:none;grid-template-columns:1fr 1fr auto;gap:7px;margin-bottom:10px;align-items:end;}
.custom-dates.show{display:grid;}
.hist-sum{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px;}
.hs-box{background:var(--bg);border:1px solid var(--border2);border-radius:7px;padding:7px;text-align:center;}
.hs-val{font-family:'Share Tech Mono',monospace;font-size:15px;line-height:1;margin-bottom:2px;}
.hs-lbl{font-size:8px;color:var(--dim);letter-spacing:1px;}
.trade-card{background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:10px;margin-bottom:6px;}
.tc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;flex-wrap:wrap;gap:3px;}
.tc-det{font-size:9px;color:var(--dim);padding-top:4px;border-top:1px solid var(--border);margin-top:3px;line-height:1.5;font-family:'Share Tech Mono',monospace;}
.log-line{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--dim);padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.02);}
.log-line.ok{color:var(--green);}
.log-line.err{color:var(--red);}
.empty-msg{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim);text-align:center;padding:20px 0;}
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--panel);border:1px solid var(--brand);border-radius:8px;padding:8px 18px;font-size:11px;color:var(--brand);transition:transform 0.3s;z-index:9998;font-family:'Share Tech Mono',monospace;}
.toast.show{transform:translateX(-50%) translateY(0);}
::-webkit-scrollbar{width:2px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);}
</style>
</head>
<body>

<!-- PASSWORD -->
<div class="pwd-screen" id="pwdScreen">
  <div class="pwd-box">
    <div class="pwd-logo">‚ö°</div>
    <div class="pwd-title">EL ROI</div>
    <div class="pwd-sub">4-IN-1 ¬∑ ENTER ACCESS CODE</div>
    <input class="pwd-input" type="password" id="pwdInput" placeholder="‚Ä¢‚Ä¢‚Ä¢‚Ä¢‚Ä¢‚Ä¢‚Ä¢‚Ä¢" onkeydown="if(event.key==='Enter')checkPwd()">
    <button class="pwd-btn" onclick="checkPwd()">üîì ENTER</button>
    <div class="pwd-error" id="pwdError"></div>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="brand">
    <div class="brand-icon">‚ö°</div>
    <div><h1>EL ROI</h1><small>4-IN-1 DOWNTREND ENGINE</small></div>
  </div>
  <div class="conn-pill"><div class="dot" id="connDot"></div><span id="connTxt">Connecting...</span></div>
</div>

<!-- BOT TABS -->
<div class="bot-tabs">
  <div class="bot-tab active" id="btab1" onclick="selBot(1)"><span>BOT 1</span><span class="bs" id="bst1">IDLE</span></div>
  <div class="bot-tab" id="btab2" onclick="selBot(2)"><span>BOT 2</span><span class="bs" id="bst2">IDLE</span></div>
  <div class="bot-tab" id="btab3" onclick="selBot(3)"><span>BOT 3</span><span class="bs" id="bst3">IDLE</span></div>
  <div class="bot-tab" id="btab4" onclick="selBot(4)"><span>BOT 4</span><span class="bs" id="bst4">IDLE</span></div>
</div>

<!-- BOT VIEWS -->
<div id="bviews"></div>

// ‚îÄ‚îÄ WEBSOCKET ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function connectDash() {
  const proto=location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(`${proto}://${location.host}/dashboard`);

  ws.onopen=()=>{ setConn(true,'Connected'); toast('‚úÖ Connected'); };

  ws.onmessage=(e)=>{
    const d=JSON.parse(e.data);
    const id=d.id;
    if(d.type==='bot_state'&&id) handleState(id,d);
    if(d.type==='price'&&id){ if(botStates[id]) botStates[id].currentPrice=d.price; drawChart(id); }
    if(d.type==='ticker'&&id){ const el=ge(`tk${id}`); if(el) el.textContent=d.msg; }
    if(d.type==='status'&&id) updateTabStatus(id,d.status,d.text);
    if(d.type==='trend'&&id) updateTrend(id,d.trendStatus,d.confirmedTrend);
    if(d.type==='candles'&&id){ localCandles[id][d.tf]=d.candles; if(d.tf===chartTFs[id]) drawChart(id); }
    if(d.type==='candle_update'&&id){
      const arr=localCandles[id][d.tf];
      if(arr&&arr.length&&arr[arr.length-1].time===d.candle.time) arr[arr.length-1]=d.candle;
      else if(arr){ arr.push(d.candle); if(arr.length>300) arr.shift(); }
      if(d.tf===chartTFs[id]) drawChart(id);
    }
    if(d.type==='trade'&&id){
      allLogs[id].unshift({...d.card,timestamp:Date.now()}); renderHist(id);
      // Update test trade button result if it was a test
      const msg=ge(`testmsg${id}`);
      if(msg&&msg.textContent==='üî• Firing trade...'){
        const c=d.card;
        msg.textContent=c.won?`‚úÖ WIN +$${parseFloat(c.profit).toFixed(2)}`:`‚ùå LOSS $${parseFloat(c.profit).toFixed(2)}`;
        msg.style.color=c.won?'var(--green)':'var(--red)';
        setTimeout(()=>{if(msg)msg.textContent='';},5000);
      }
    }
    if(d.type==='loss_countdown'&&id) updateLcd(id,d.remaining,d.total);
    if(d.type==='time_off'&&id) updateToffCd(id,d.remaining,d.total);
    if(d.type==='log'&&id) addSlog(id,d.msg);
    if(d.type==='full_history'&&id){ allLogs[id]=d.tradeLog.map(c=>({...c,timestamp:c.timestamp||Date.now()})); renderHist(id); }

    // Live OAuth flow
    if(d.type==='live_login_url'&&id){
      // Open Deriv login in new tab
      window.open(d.url,'_blank','noopener');
      const el=ge(`liveStatus${id}`);
      if(el){ el.textContent='‚è≥ Waiting for Deriv login...'; el.style.color='var(--yellow)'; }
    }
    if(d.type==='live_login_status'&&id){
      const el=ge(`liveStatus${id}`);
      const btn=ge(`loginBtn${id}`);
      const info=ge(`liveAcctInfo${id}`);
      if(d.status==='ready'){
        if(el){ el.textContent='‚úÖ Logged in'; el.style.color='var(--green)'; }
        if(btn){ btn.textContent='‚úÖ LOGGED IN ‚Äî RE-LOGIN'; btn.classList.add('logged-in'); btn.disabled=false; }
        if(info){ info.style.display='block'; info.textContent=`Account: ${d.msg.split('account ')[1]||''}`; }
        toast(`‚úÖ Bot ${id} live login successful`);
      } else if(d.status==='error'||d.status==='expired'){
        if(el){ el.textContent=d.msg; el.style.color='var(--red)'; }
        if(btn){ btn.textContent='üîê LOGIN WITH DERIV'; btn.classList.remove('logged-in'); btn.disabled=false; }
        if(info) info.style.display='none';
        toast(`‚ùå Bot ${id}: ${d.msg}`);
      } else {
        if(el){ el.textContent=d.msg; el.style.color='var(--yellow)'; }
        if(btn) btn.disabled=true;
      }
    }
  };

  ws.onclose=()=>{ setConn(false,'Disconnected'); setTimeout(connectDash,3000); };
  ws.onerror=()=>setConn(false,'Error');
}

function send(obj){ if(ws?.readyState===1) ws.send(JSON.stringify(obj)); }

// ‚îÄ‚îÄ STATE HANDLER ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function handleState(id,d) {
  botStates[id]=d;
  const tc=d.tradeCount||0,w=d.wins||0,l=d.losses||0,pnl=d.sessionPnl||0;
  const wr=tc>0?Math.round((w/tc)*100):0;
  setTxt(`s${id}t`,tc); setTxt(`s${id}w`,w); setTxt(`s${id}l`,l); setTxt(`s${id}wr`,wr+'%');
  const pel=ge(`s${id}pnl`);
  if(pel){ pel.textContent=(pnl>=0?'+':'')+'$'+Math.abs(pnl).toFixed(2); pel.style.color=pnl>0?'var(--green)':pnl<0?'var(--red)':'var(--white)'; }
  setTxt(`tk${id}`,d.tickerMsg||`‚Äî BOT ${id} READY ‚Äî`);
  if(d.trendStatus) updateTrend(id,d.trendStatus,d.confirmedTrend);
  updateStructures(id,d.activeStructures,d.ignoredLevels);
  if(d.lossCountdownPaused) updateLcd(id,d.lossCountdownRemaining,d.lossCountdownTotal);
  else ge(`lcd${id}`)?.classList.remove('show');
  if(d.timeOffPaused) updateToffCd(id,d.timeOffRemaining,d.timeOffTotal);
  else ge(`toffcd${id}`)?.classList.remove('show');
  if(d.htfZonePaused) ge(`htfcd${id}`)?.classList.add('show');
  else ge(`htfcd${id}`)?.classList.remove('show');
  const sb=ge(`startbtn${id}`), xb=ge(`stopbtn${id}`);
  if(sb) sb.disabled=d.botActive;
  if(xb) xb.disabled=!d.botActive;
  updateTabStatus(id,d.botActive?'running':'stopped',d.statusText);
  // Zones ‚Äî keep both arrays separate
  if(d.doNotTradeZones){ doNotTradeZones[id]=d.doNotTradeZones; renderDntZones(id); }
  if(d.htfZones){
    // Mark active zone
    if(d.activeHtfZoneId){
      d.htfZones.forEach(z=>{ z.active = z.id===d.activeHtfZoneId; });
    } else {
      d.htfZones.forEach(z=>{ z.active=false; });
    }
    htfZones[id]=d.htfZones; renderHtfZones(id);
  }
  if(d.autoHtfStructures) autoHtfStructs[id]=d.autoHtfStructures;
  if(d.tradeLog&&d.tradeLog.length&&!allLogs[id].length){
    allLogs[id]=d.tradeLog.map(c=>({...c,timestamp:c.timestamp||Date.now()}));
    renderHist(id);
  }
  send({type:'get_history',id});
  // Sync live login UI from bot state
  if(d.cfg && d.cfg.accountType==='live'){
    const btn=ge(`loginBtn${id}`);
    const el=ge(`liveStatus${id}`);
    const info=ge(`liveAcctInfo${id}`);
    if(d.liveLoggedIn){
      if(btn){ btn.textContent='‚úÖ LOGGED IN ‚Äî RE-LOGIN'; btn.classList.add('logged-in'); btn.disabled=false; }
      if(el){ el.textContent='‚úÖ Logged in'; el.style.color='var(--green)'; }
      if(info&&d.liveAccountId){ info.style.display='block'; info.textContent=`Account: ${d.liveAccountId}`; }
    } else {
      if(btn){ btn.textContent='üîê LOGIN WITH DERIV'; btn.classList.remove('logged-in'); btn.disabled=false; }
      if(el&&el.textContent==='‚úÖ Logged in'){ el.textContent=''; }
    }
  }
  if(d.cfg) applyCfg(id,d.cfg);
}

function applyCfg(id,cfg){
  selMkt[id]=cfg.market||'1HZ100V';
  selCmd[id]=cfg.command||'NOTOUCH';
  if(cfg.accountType) selAcct[id]=cfg.accountType;
  const s=(eid,v)=>{ const el=ge(eid); if(el&&v!=null) el.value=v; };
  s(`tok${id}`,cfg.apiToken);
  s(`bar${id}`,cfg.barrierOffset); s(`stk${id}`,cfg.stake);
  s(`dur${id}`,cfg.durationMins); s(`barHL${id}`,cfg.barrierOffset); s(`stkHL${id}`,cfg.stake);
  s(`durHL${id}`,cfg.durationMins); s(`stkRF${id}`,cfg.stake); s(`durRF${id}`,cfg.durationMins);
  s(`stkMu${id}`,cfg.stake); s(`mult${id}`,cfg.multiplier); s(`tp${id}`,cfg.takeProfit); s(`sl${id}`,cfg.stopLoss);
  s(`stf${id}`,cfg.scanTF); s(`mtf${id}`,cfg.minTFConfirm); s(`prx${id}`,cfg.proximityPct);
  s(`stol${id}`,cfg.smallTol); s(`btol${id}`,cfg.bigTol); s(`sc${id}`,cfg.smallConfirm);
  s(`htfclose${id}`,cfg.htfClosePct); s(`htfpass${id}`,cfg.htfPassPct);
  // Set scanTFs checkboxes
  if(cfg.scanTFs&&Array.isArray(cfg.scanTFs)){
    const cbs=document.querySelectorAll(`.stf-cb[data-bot="${id}"]`);
    cbs.forEach(cb=>{ cb.checked=cfg.scanTFs.includes(cb.dataset.tf); });
  }
  s(`bc${id}`,cfg.bigConfirm); s(`mt${id}`,cfg.maxTrades); s(`ml${id}`,cfg.maxConsecLosses);
  s(`cd${id}`,cfg.cooldownSecs); s(`ttok${id}`,cfg.teleToken); s(`tchat${id}`,cfg.teleChatId);
  setTxt(`smkt${id}`,MARKETS.find(m=>m.id===selMkt[id])?.name||selMkt[id]);
  renderMkts(id); renderCmds(id);
  // Refresh account toggle UI
  ['demo','live'].forEach(t=>{
    const btn=ge(`abtn_${t}_${id}`);
    if(btn){ btn.className=`acct-btn ${t}${selAcct[id]===t?' sel':''}`; }
  });
  ge(`demoFields${id}`)&&(ge(`demoFields${id}`).style.display=selAcct[id]==='live'?'none':'');
  ge(`liveFields${id}`)&&(ge(`liveFields${id}`).style.display=selAcct[id]==='live'?'':'none');
  document.querySelectorAll(`#sp${id}settings .sub-opts`).forEach(x=>x.classList.remove('show'));
  const sub=ge(`${COMMANDS[selCmd[id]]?.sub}${id}`);
  if(sub) sub.classList.add('show');
}

// ‚îÄ‚îÄ TREND ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function updateTrend(id,ts,confirmed){
  if(!ts) return;
  ['M1','M5','M15'].forEach(tf=>{
    const t=ts[tf];
    const box=ge(`tb${id}${tf}`), sig=ge(`ts${id}${tf}`), st=ge(`tst${id}${tf}`);
    if(!box) return;
    box.className=`tf-box${t==='down'?' dn':t==='up'?' up':''}`;
    sig.textContent=t==='down'?'üìâ':t==='up'?'üìà':'‚û°Ô∏è';
    st.textContent=t==='down'?'DOWNTREND':t==='up'?'UPTREND':'NEUTRAL';
    st.style.color=t==='down'?'var(--red)':t==='up'?'var(--green)':'var(--dim)';
  });
  const dc=Object.values(ts).filter(t=>t==='down').length;
  const el=ge(`tconf${id}`);
  if(el){ el.textContent=confirmed?`‚úÖ ${dc}/3 DOWNTREND CONFIRMED`:`‚è≥ ${dc}/3 downtrend`; el.style.color=confirmed?'var(--red)':'var(--dim)'; }
}

function updateStructures(id,structs,ignoredLevels){
  const list=ge(`slst${id}`);
  if(!list) return;
  if(!structs||!structs.length){ list.innerHTML='<div class="empty-msg">Scanning...</div>'; setTxt(`scnt${id}`,''); return; }
  const ignored=new Set(ignoredLevels||[]);
  setTxt(`scnt${id}`,`${structs.length} ACTIVE`);
  list.innerHTML=structs.map(s=>{
    const isSmall=s.type==='small';
    let html=`<div class="struct-block">
      <div class="struct-hdr"><span>${s.type.toUpperCase()} ¬∑ ${s.tf} ¬∑ diff=${s.baseDiff?.toFixed(2)}</span><span>${s.peaks?.length||0} peaks</span></div>`;
    (s.peaks||[]).forEach((pk,i)=>{
      html+=`<div class="r-level ${isSmall?'small-lv':'big-lv'}">
        <span>R${i+1} <span class="r-badge ${isSmall?'rb-s':'rb-b'}">${isSmall?'S':'B'}</span></span>
        <span style="color:${isSmall?'var(--accent)':'var(--orange)'}">${parseFloat(pk.price).toFixed(2)}</span>
      </div>`;
    });
    (s.projectedLevels||[]).forEach(lv=>{
      const lvs=parseFloat(lv).toFixed(2);
      const isIgn=ignored.has(lvs);
      html+=`<div class="r-level next-lv${isIgn?' ignored-lv':''}">
        <span>NEXT <span class="r-badge rb-p">TARGET</span>${isIgn?' üö´':''}</span>
        <div style="display:flex;align-items:center;gap:6px">
          <span style="color:var(--purple)">${lvs}</span>
          <button class="btn-ign${isIgn?' active':''}" onclick="toggleIgn(${id},'${lvs}')">${isIgn?'UN-IGN':'IGNORE'}</button>
        </div>
      </div>`;
    });
    html+='</div>';
    return html;
  }).join('');
}

// ‚îÄ‚îÄ HTF ZONES ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function addHtfZone(id){
  const a=parseFloat(ge(`htfa${id}`)?.value);
  const b=parseFloat(ge(`htfb${id}`)?.value);
  if(isNaN(a)||isNaN(b)){ toast('‚öÝ Enter valid Zone Top (A) and Bottom (B)'); return; }
  if(a<=b){ toast('‚öÝ Zone Top (A) must be higher than Bottom (B)'); return; }
  send({type:'add_htf_zone',id,a,b});
  if(ge(`htfa${id}`)) ge(`htfa${id}`).value='';
  if(ge(`htfb${id}`)) ge(`htfb${id}`).value='';
  toast(`‚öÝ Manual HTF Zone ${a}‚Äì${b} added to Bot ${id}`);
}
function cancelHtfZone(id,zoneId){
  send({type:'cancel_htf_zone',id,zoneId});
  const z=htfZones[id].find(x=>x.id===zoneId);
  if(z){ z.cancelled=true; renderHtfZones(id); }
  toast('‚úÖ HTF Zone cancelled');
}
function restoreHtfZone(id,zoneId){
  send({type:'restore_htf_zone',id,zoneId});
  const z=htfZones[id].find(x=>x.id===zoneId);
  if(z){ z.cancelled=false; renderHtfZones(id); }
  toast('‚Ü© HTF Zone restored');
}
function removeHtfZone(id,zoneId){
  send({type:'remove_htf_zone',id,zoneId});
  htfZones[id]=htfZones[id].filter(x=>x.id!==zoneId);
  renderHtfZones(id);
  toast('‚úÖ Manual HTF Zone removed');
}
function renderHtfZones(id){
  const list=ge(`htflst${id}`);
  if(!list) return;
  const zones=htfZones[id]||[];
  if(!zones.length){
    list.innerHTML='<div style="font-size:9px;color:var(--dim);font-family:Share Tech Mono,monospace">Start bot to detect...</div>';
    return;
  }
  list.innerHTML=zones.map(z=>{
    const isAuto=z.source==='auto';
    const isCancelled=z.cancelled;
    const hi=Math.max(z.a,z.b).toFixed(2), lo=Math.min(z.a,z.b).toFixed(2);
    const isActive = z.active && !isCancelled;
    const borderCol = isActive ? 'rgba(0,255,157,0.6)' : isAuto ? 'rgba(191,90,242,0.35)' : 'rgba(255,214,10,0.4)';
    const textCol   = isActive ? 'var(--green)' : isAuto ? 'var(--purple)' : 'var(--yellow)';
    const icon      = isCancelled ? 'üö´' : isActive ? 'üü¢' : '‚öÝ';
    return `<div class="zone-item htf ${isCancelled?'cancelled':''}" style="border-color:${borderCol};color:${textCol}">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:3px;margin-bottom:2px">
          <span>${icon}</span>
          <span style="font-size:10px">${hi} ‚Üí ${lo}</span>
          <span class="htf-badge ${isAuto?'auto':'manual'}">${isAuto?'AUTO':'MANUAL'}</span>
          ${isActive?'<span style="font-size:7px;color:var(--green);font-family:Share Tech Mono,monospace;letter-spacing:1px">ACTIVE</span>':''}
        </div>
        <div style="font-size:8px;color:var(--dim);font-family:'Share Tech Mono',monospace">${z.label||''}</div>
        
      </div>
      <div style="display:flex;gap:4px;flex-shrink:0">
        ${isCancelled
          ? `<button class="btn-restore" onclick="restoreHtfZone(${id},'${z.id}')">‚Ü© RESTORE</button>`
          : `<button class="btn-del htf-del" onclick="cancelHtfZone(${id},'${z.id}')">${isAuto?'‚úï CANCEL':'‚úï REMOVE'}</button>`
        }
      </div>
    </div>`;
  }).join('');
}

function startBot(id){
  const cfg=buildCfg(id);
  const isLive=selAcct[id]==='live';
  const state=botStates[id]||{};
  if(isLive){
    if(!state.liveLoggedIn){ toast('‚öÝ Login with Deriv first (Settings ‚Üí Live)'); showSub(id,'settings',null); return; }
  } else {
    if(!cfg.apiToken){ toast('‚öÝ Enter API token in Settings'); showSub(id,'settings',null); return; }
  }
  send({type:'start',id,cfg});
  if(ge(`startbtn${id}`)) ge(`startbtn${id}`).disabled=true;
  if(ge(`stopbtn${id}`)) ge(`stopbtn${id}`).disabled=false;
}
function stopBot(id){ send({type:'stop',id}); }
function skipCd(id){ send({type:'skip_cooldown',id}); ge(`lcd${id}`)?.classList.remove('show'); toast('‚ö° Cooldown skipped'); }
function doToff(id,secs){ send({type:'time_off',id,secs}); toast(`‚è∞ Bot ${id} time off started`); }
function cancelToff(id){ send({type:'cancel_time_off',id}); ge(`toffcd${id}`)?.classList.remove('show'); toast('‚úÖ Time off cancelled'); }
function toggleIgn(id,lv){ send({type:'ignore_level',id,level:lv}); toast(`Level ${lv} toggled`); }

function getScanTFs(id){
  const cbs=document.querySelectorAll('.stf-cb[data-bot="'+id+'"]');
  const selected=[...cbs].filter(cb=>cb.checked).map(cb=>cb.dataset.tf);
  return selected.length>0?selected:['M1','M5'];
}

function buildCfg(id){
  const g=eid=>ge(eid)?.value;
  const cmd=selCmd[id];
  const isNT=['NOTOUCH','TOUCH'].includes(cmd), isHL=['HIGHER','LOWER'].includes(cmd), isRF=['RISE','FALL'].includes(cmd);
  return {
    accountType: selAcct[id],
    apiToken: g(`tok${id}`),
    market:selMkt[id], command:cmd,
    stake:parseFloat(isNT?g(`stk${id}`):isHL?g(`stkHL${id}`):isRF?g(`stkRF${id}`):g(`stkMu${id}`))||1,
    durationMins:parseInt(isNT?g(`dur${id}`):isHL?g(`durHL${id}`):g(`durRF${id}`))||5,
    barrierOffset:isNT?g(`bar${id}`):g(`barHL${id}`)||'+2.1',
    multiplier:parseInt(g(`mult${id}`))||10, takeProfit:parseFloat(g(`tp${id}`))||4, stopLoss:parseFloat(g(`sl${id}`))||2,
    scanTF:g(`stf${id}`)||'M1+M5', minTFConfirm:parseInt(g(`mtf${id}`))||2, proximityPct:parseFloat(g(`prx${id}`))||90,
    smallTol:parseInt(g(`stol${id}`))||10, bigTol:parseInt(g(`btol${id}`))||15,
    smallConfirm:parseInt(g(`sc${id}`))||1, bigConfirm:parseInt(g(`bc${id}`))||2,
    maxTrades:parseInt(g(`mt${id}`))||0, maxConsecLosses:parseInt(g(`ml${id}`))||2,
    htfClosePct:parseFloat(g(`htfclose${id}`))||20, htfPassPct:parseFloat(g(`htfpass${id}`))||30,
    scanTFs:getScanTFs(id),
    cooldownSecs:parseInt(g(`cd${id}`))||1800, teleToken:g(`ttok${id}`), teleChatId:g(`tchat${id}`),
  };
}

function saveSettings(id){
  const cfg=buildCfg(id);
  send({type:'update_cfg',id,cfg});
  const saved=JSON.parse(localStorage.getItem('elroi_cfg')||'{}');
  saved[id]=cfg; localStorage.setItem('elroi_cfg',JSON.stringify(saved));
  toast(`‚úÖ Bot ${id} settings saved`);
}

function loadSaved(){
  const saved=JSON.parse(localStorage.getItem('elroi_cfg')||'{}');
  [1,2,3,4].forEach(id=>{ if(saved[id]) applyCfg(id,saved[id]); });
}

// ‚îÄ‚îÄ HISTORY ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function setHist(id,f,el){
  histFilter[id]=f;
  document.querySelectorAll(`#sp${id}log .hf-btn`).forEach(b=>b.classList.remove('active'));
  if(el) el.classList.add('active');
  const cd=ge(`cdate${id}`); if(cd) cd.classList.toggle('show',f==='custom');
  renderHist(id);
}
function applyDate(id){ customFrom[id]=ge(`dfrom${id}`)?.value||''; customTo[id]=ge(`dto${id}`)?.value||''; renderHist(id); }

function renderHist(id){
  const now=new Date(), f=histFilter[id]||'all';
  const filtered=(allLogs[id]||[]).filter(c=>{
    if(f==='all') return true;
    const d=new Date(c.timestamp||Date.now());
    if(f==='today') return d.toDateString()===now.toDateString();
    if(f==='week'){ const w=new Date(now); w.setDate(now.getDate()-7); return d>=w; }
    if(f==='month') return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    if(f==='custom'){
      const fr=customFrom[id]?new Date(customFrom[id]):null;
      const to=customTo[id]?new Date(customTo[id]):null;
      if(fr&&d<fr) return false;
      if(to){ const te=new Date(to); te.setDate(te.getDate()+1); if(d>te) return false; }
      return true;
    }
    return true;
  });
  const tw=filtered.filter(c=>c.won).length;
  const pnl=filtered.reduce((s,c)=>s+(c.profit||0),0);
  const wr=filtered.length>0?Math.round((tw/filtered.length)*100):0;
  setTxt(`ht${id}`,filtered.length); setTxt(`hwr${id}`,wr+'%');
  const pel=ge(`hpnl${id}`);
  if(pel){ pel.textContent=(pnl>=0?'+':'')+'$'+Math.abs(pnl).toFixed(2); pel.style.color=pnl>0?'var(--green)':pnl<0?'var(--red)':'var(--white)'; }
  const log=ge(`tlog${id}`);
  if(!log) return;
  if(!filtered.length){ log.innerHTML='<div class="empty-msg">No trades in this period</div>'; return; }
  log.innerHTML=filtered.map(c=>`
    <div class="trade-card">
      <div class="tc-top">
        <span style="font-size:9px;color:var(--dim);font-family:'Share Tech Mono',monospace">${c.date||''} ${c.time||''}</span>
        <span style="font-size:11px;font-weight:700;color:${c.won?'var(--green)':'var(--red)'}">${c.won?'‚úÖ WIN':'‚ùå LOSS'}</span>
        <span style="font-family:'Share Tech Mono',monospace;font-size:12px;color:${c.won?'var(--green)':'var(--red)'}">${c.profit>=0?'+':''}$${parseFloat(c.profit).toFixed(2)}</span>
      </div>
      <div class="tc-det">Market: ${c.market||'--'} | ${c.command||'--'} | Level: ${c.level||'--'} | ${(c.struct||'').toUpperCase()} | WR: ${c.wr||0}%</div>
    </div>`).join('');
}

function addSlog(id,msg){
  const el=ge(`slog${id}`); if(!el) return;
  const div=document.createElement('div');
  div.className='log-line'+(msg.includes('WIN')||msg.includes('‚úÖ')?' ok':msg.includes('LOSS')||msg.includes('‚ùå')?' err':'');
  div.textContent=msg; el.prepend(div);
  if(el.children.length>100) el.lastChild.remove();
}

// ‚îÄ‚îÄ CHART ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function setTF(id,tf,el){
  chartTFs[id]=tf;
  document.querySelectorAll(`#sp${id}chart .tf-btn`).forEach(b=>b.classList.remove('active'));
  if(el) el.classList.add('active');
  drawChart(id);
}

function drawChart(id){
  const canvas=ge(`chart${id}`); if(!canvas) return;
  const ctx=canvas.getContext('2d');
  canvas.width=canvas.offsetWidth||400; canvas.height=240;
  const w=canvas.width, h=canvas.height;
  const tf=chartTFs[id]||'M1';
  const data=(localCandles[id]||{})[tf]||[];
  const state=botStates[id]||{};
  const dntZones=doNotTradeZones[id]||[];
  const htfZns=htfZones[id]||[];

  ctx.fillStyle='#03060f'; ctx.fillRect(0,0,w,h);
  if(!data.length){ ctx.fillStyle='#1e3a55'; ctx.font='11px Share Tech Mono'; ctx.textAlign='center'; ctx.fillText('Waiting for data...',w/2,h/2); return; }

  const vis=data.slice(-60);
  const price=state.currentPrice||0;

  // Chart range built from candles + structures + current price ONLY
  // HTF and DNT zones never affect zoom ‚Äî exactly like MT5
  const allP=vis.flatMap(c=>[c.high,c.low]);
  (state.activeStructures||[]).forEach(s=>{
    (s.peaks||[]).forEach(p=>allP.push(p.price));
    (s.projectedLevels||[]).forEach(l=>allP.push(l));
  });
  if(price>0) allP.push(price);
  const minP=Math.min(...allP)*0.9997, maxP=Math.max(...allP)*1.0003, rng=maxP-minP||1;

  // HTF and DNT zones ‚Äî only show if zone is within the visible chart range
  // minP and maxP define what's visible ‚Äî if the zone falls in that range, draw it
  // This is exactly like MT5: you only see the line when you're looking at that price area
  const visibleHtfZns = htfZns.filter(z=>{
    if(z.cancelled) return false;
    const hi=Math.max(z.a,z.b), lo=Math.min(z.a,z.b);
    // Zone overlaps with visible chart range
    return lo<=maxP && hi>=minP;
  });

  const visibleDntZns = dntZones.filter(z=>{
    const hi=Math.max(z.a,z.b), lo=Math.min(z.a,z.b);
    return lo<=maxP && hi>=minP;
  });
  const pad={t:18,r:62,b:20,l:6};
  const pw=w-pad.l-pad.r, ph=h-pad.t-pad.b;
  const pY=p=>pad.t+ph-((p-minP)/rng)*ph;
  const iX=i=>pad.l+(i/Math.max(vis.length-1,1))*pw;

  // Grid
  ctx.strokeStyle='#0d1830'; ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=pad.t+(i/4)*ph;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(w-pad.r,y); ctx.stroke();
    ctx.fillStyle='#1e3a55'; ctx.font='8px Share Tech Mono'; ctx.textAlign='left';
    ctx.fillText((maxP-(i/4)*rng).toFixed(2),w-pad.r+3,y+3);
  }

  // Do Not Trade Zones ‚Äî only draw when price is near (like MT5)
  visibleDntZns.forEach(z=>{
    const y1=pY(Math.max(z.a,z.b)), y2=pY(Math.min(z.a,z.b));
    ctx.fillStyle='rgba(255,45,85,0.08)'; ctx.fillRect(pad.l,y1,pw,Math.max(y2-y1,2));
    ctx.strokeStyle='rgba(255,45,85,0.3)'; ctx.lineWidth=1; ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(pad.l,y1); ctx.lineTo(w-pad.r,y1); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(pad.l,y2); ctx.lineTo(w-pad.r,y2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='rgba(255,45,85,0.6)'; ctx.font='8px Share Tech Mono'; ctx.textAlign='left';
    ctx.fillText(`NO TRADE ${parseFloat(z.a).toFixed(0)}-${parseFloat(z.b).toFixed(0)}`,pad.l+3,y1+10);
  });

  // HTF Zones ‚Äî only draw if price is near the zone (clean chart like MT5)
  // Active zone (uptrend detected inside it) = green. Manual = yellow. Auto = purple.
  visibleHtfZns.forEach(z=>{
    const isManual=z.source==='manual';
    const isActive=z.active;
    const fillColor  =isActive?'rgba(0,255,157,0.08)':isManual?'rgba(255,214,10,0.06)':'rgba(191,90,242,0.07)';
    const strokeColor=isActive?'rgba(0,255,157,0.7)' :isManual?'rgba(255,214,10,0.5)' :'rgba(191,90,242,0.45)';
    const textColor  =isActive?'rgba(0,255,157,0.9)' :isManual?'rgba(255,214,10,0.8)' :'rgba(191,90,242,0.8)';
    const y1=pY(Math.max(z.a,z.b)), y2=pY(Math.min(z.a,z.b));
    ctx.fillStyle=fillColor; ctx.fillRect(pad.l,y1,pw,Math.max(y2-y1,2));
    ctx.strokeStyle=strokeColor; ctx.lineWidth=1; ctx.setLineDash(isManual?[3,3]:[4,3]);
    ctx.beginPath(); ctx.moveTo(pad.l,y1); ctx.lineTo(w-pad.r,y1); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(pad.l,y2); ctx.lineTo(w-pad.r,y2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle=textColor; ctx.font='8px Share Tech Mono'; ctx.textAlign='left';
    const lbl=z.label?z.label:`HTF ${parseFloat(z.a).toFixed(2)}-${parseFloat(z.b).toFixed(2)}`;
    ctx.fillText(lbl,pad.l+3,y2-3);
  });

  // Candles
  const cw=Math.max(2,pw/vis.length-1);
  vis.forEach((c,i)=>{
    const x=iX(i), bull=c.close>=c.open;
    ctx.strokeStyle=bull?'#00ff9d':'#ff2d55'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x,pY(c.high)); ctx.lineTo(x,pY(c.low)); ctx.stroke();
    ctx.fillStyle=bull?'rgba(0,255,157,0.7)':'rgba(255,45,85,0.7)';
    const top=Math.min(pY(c.open),pY(c.close)), bh=Math.max(1,Math.abs(pY(c.close)-pY(c.open)));
    ctx.fillRect(x-cw/2,top,cw,bh);
  });

  // Structures
  (state.activeStructures||[]).forEach(s=>{
    const isSmall=s.type==='small';
    (s.peaks||[]).forEach((pk,pi)=>{
      const y=pY(pk.price);
      ctx.strokeStyle=isSmall?'rgba(0,212,255,0.6)':'rgba(255,107,43,0.6)';
      ctx.lineWidth=isSmall?1:1.5; ctx.setLineDash([4,4]);
      ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(w-pad.r,y); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle=isSmall?'#00d4ff':'#ff6b2b'; ctx.font='8px Share Tech Mono'; ctx.textAlign='left';
      ctx.fillText(`R${pi+1} ${parseFloat(pk.price).toFixed(2)}`,pad.l+3,y-3);
    });
    (s.projectedLevels||[]).forEach(lv=>{
      const y=pY(lv);
      ctx.strokeStyle='rgba(191,90,242,0.8)'; ctx.lineWidth=2; ctx.setLineDash([5,3]);
      ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(w-pad.r,y); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle='#bf5af2'; ctx.font='bold 8px Share Tech Mono'; ctx.textAlign='left';
      ctx.fillText(`NEXT ${parseFloat(lv).toFixed(2)}`,pad.l+3,y-3);
    });
  });

  // Price line ‚Äî use already-declared price variable from above
  if(price>0){
    const y=pY(price);
    ctx.strokeStyle='rgba(0,212,255,0.5)'; ctx.lineWidth=1; ctx.setLineDash([2,2]);
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(w-pad.r,y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#00d4ff'; ctx.fillRect(w-pad.r,y-8,pad.r-2,16);
    ctx.fillStyle='#000'; ctx.font='bold 8px Share Tech Mono'; ctx.textAlign='center';
    ctx.fillText(parseFloat(price).toFixed(2),w-pad.r+(pad.r-2)/2,y+3);
  }
}

  },5000);
}

function ge(id){ return document.getElementById(id); }
function setTxt(id,val){ const el=ge(id); if(el) el.textContent=val; }
function setConn(ok,msg){ ge('connDot').className='dot '+(ok?'running':'stopped'); setTxt('connTxt',msg); }
function toast(msg){ const t=ge('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }

// ‚îÄ‚îÄ INIT ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function initApp(){
  buildUI(); loadSaved();
  [1,2,3,4].forEach(id=>{ renderDntZones(id); renderHtfZones(id); renderHist(id); });
  window.addEventListener('resize',()=>{
    const canvas=ge(`chart${activeBotId}`);
    if(canvas){ canvas.width=canvas.offsetWidth||400; drawChart(activeBotId); }
  });
  connectDash();
}

window.onload=()=>{
  if(sessionStorage.getItem('elroi_auth')==='1'){
    ge('pwdScreen').classList.add('hidden');
    initApp();
  } else {
    ge('pwdInput').focus();
  }
};
